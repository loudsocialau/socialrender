<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed | Social Render</title>
  <meta name="description" content="Thanks for choosing Social Render. Complete your project brief to get started." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(109,93,246,.18), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(143,211,255,.12), transparent 30%),
        #050505;
      color: #fff;
      font-family: Inter, Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .card {
      width: 100%;
      max-width: 760px;
      text-align: center;
      padding: 72px 42px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 28px;
      background: rgba(255,255,255,.035);
      backdrop-filter: blur(16px);
      box-shadow: 0 40px 120px rgba(0,0,0,.45);
    }
    .logo {
      letter-spacing: .38em;
      font-size: 13px;
      font-weight: 700;
      color: #8f7cff;
      margin-bottom: 36px;
    }
    h1 {
      font-size: clamp(44px, 7vw, 82px);
      line-height: .95;
      font-weight: 600;
      letter-spacing: -.055em;
      margin-bottom: 24px;
    }
    p {
      max-width: 560px;
      margin: 0 auto 14px;
      color: rgba(255,255,255,.72);
      font-size: clamp(17px, 2vw, 21px);
      line-height: 1.55;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 34px;
      padding: 18px 32px;
      border-radius: 999px;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      letter-spacing: .02em;
      background: linear-gradient(135deg, #6D5DF6, #8FD3FF);
      box-shadow: 0 16px 40px rgba(109,93,246,.38);
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 22px 55px rgba(109,93,246,.52); }
    .note { margin-top: 34px; font-size: 14px; color: rgba(255,255,255,.45); }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">SOCIAL RENDER</div>
    <h1>🎉 Order Confirmed</h1>
    <p>Thanks for choosing Social Render.</p>
    <p>To get started, complete your project brief below.</p>
    <a class="btn" href="https://tally.so/r/QK4dx7">Complete Brief →</a>
    <div class="note">We'll review your project once your brief has been submitted.</div>
  </main>
</body>
</html>
